rules:
  - id: WMs
    languages:
      - python
    message: May detect a WM here. Please remove it to keep the output clean.
    pattern-either:
      - pattern: >
          $X = $FUNC(...,$Y=False,...)
      - pattern: >
          $X = $FUNC(...,$Y=True,...)
      - pattern: >
          if (...):
            ...
      - pattern: >
          $DICT = dict(...)
      - pattern: >
          $DICT = {...}
      - pattern: >
          if $X is None:
            ...
      - pattern: >
          if $X is not None:
            ...
      - pattern: >
          print(...%...)
      - pattern: >
          print($X.format(...))
      - pattern: >
          $X = $X + $Y
      - pattern: >
          $X +=  $Y
      - pattern: >
          $X = $X - $Y
      - pattern: >
          $X -=  $Y
      - pattern: >
          $X = $X * $Y
      - pattern: >
          $X *=  $Y
      - pattern: >
          $X = $X / $Y
      - pattern: >
          $X /=  $Y
      - pattern: >
          $X = np.$FUNC(...)
      - pattern: >
          $X = math.$FUNC(...)
      - pattern: >
          pd.$FUNC(...)
      - pattern: >
          logging.$FUNC(...)
      - pattern: >
          logger.$FUNC(...)
      - pattern: >
          $X = copy(...)
      - pattern: >
          $CPO = deepcopy(...)
      - pattern: >
          $X = $Y >> $Z
      - pattern: >
          $STR.lower().strip()
      - pattern: >
          $STR.strip().lower()
      - pattern: >
          $STR.upper().strip()
      - pattern: >
          $STR.strip().upper()
      - pattern: >
          for i in $X:
            ...
      - pattern: >
          isinstance(...)
      - pattern: >
          type(...)
      - pattern: >
          list(...)
    severity: ERROR
